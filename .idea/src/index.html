<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTrack — Мій Кінопростір</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sidebar">
    <a href="index.html" class="sidebar__logo-link">
        <h2 class="sidebar__title">🎬 CineTrack</h2>
    </a>
    <button class="nav-btn active" onclick="switchTab('movies-tab', event)">🍿 Фільми</button>
    <button class="nav-btn" onclick="switchTab('users-tab', event)">👥 Користувачі</button>
</div>

<div class="main-content">

    <div class="top-bar">
        <h1 class="page-title">Каталог Фільмів</h1>

        <div class="user-profile-menu">
            <div class="avatar-button" onclick="toggleProfileMenu()">
                <span class="avatar-icon">👤</span>
                <span class="user-status-dot"></span>
            </div>
            <div class="dropdown-content" id="profileDropdown">
                <div class="dropdown-header">
                    <strong id="current-username">Завантаження...</strong>
                    <span id="current-user-role">Користувач</span>
                </div>
                <hr>
                <a href="#" onclick="switchTab('profile-tab')">⚙️ Мій Кабінет</a>
                <a href="#" id="admin-menu-link" onclick="switchTab('admin-tab')" style="display: none;">🛡️ Адмін-панель</a>
                <hr>
                <div class="switch-mock-user">
                    <label>Змінити роль (тест):</label>
                    <select id="userRoleSelector" onchange="mockUserChange(this.value)">
                        <option value="USER">Звичайний Юзер</option>
                        <option value="ADMIN">Адміністратор</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="filter-bar">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="movieSearchInput" placeholder="Пошук фільмів за назвою або жанром..." oninput="handleSearch()">
        </div>

        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="loadAllMovies()">Показати всі</button>
            <button class="btn btn-primary" onclick="loadRandomMovie()">🎲 Рандом</button>
        </div>
    </div>

    <div id="movies-tab" class="tab-content active">
        <div class="grid-container" id="movies-list"></div>
    </div>

    <div id="users-tab" class="tab-content">
        <div class="grid-container" id="users-list"></div>
    </div>

    <div id="profile-tab" class="tab-content">
    </div>

    <div id="admin-tab" class="tab-content">
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
